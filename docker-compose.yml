services:
  app:
    image: bot-company-alart:latest
    build: .
    ports:
      - "3900:3900"
    environment:
      NODE_ENV: production
      PORT: 3900
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      SESSION_SECRET: ${SESSION_SECRET:-change-this-session-secret}
      DB_PATH: /data/database.sqlite
    volumes:
      - ./data:/data
    restart: unless-stopped
